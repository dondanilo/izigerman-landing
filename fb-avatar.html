<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 400px; height: 400px; overflow: hidden;
    background: linear-gradient(145deg, #1a2a4a 0%, #0d1b35 60%, #0a1628 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  }
  .flag {
    font-size: 96px;
    line-height: 1;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
  }
  .brand {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }
  .brand span:first-child { color: #ffffff; }
  .brand span:last-child  { color: #E30A17; }
</style>
</head>
<body>
  <div class="flag">🇹🇷</div>
  <div class="brand"><span>Izi</span><span>Turkish</span></div>
</body>
</html>
